<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>어안렌즈</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">
    <header class="header">
      <h1 class="title">어안렌즈</h1>
    </header>

    <div class="frame">
      <canvas id="canvas" width="700" height="700"></canvas>
      <div id="hint" class="hint">탭해서 시작</div>
    </div>

    <div class="controls">
      <div class="slider-row">
        <span class="label">강도</span>
        <input type="range" id="strength" min="0" max="1" step="0.01" value="0.7" />
        <span id="strengthValue" class="value">0.70</span>
      </div>
      <div class="slider-row">
        <span class="label">줌</span>
        <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.3" />
        <span id="zoomValue" class="value">1.30x</span>
      </div>

      <div class="hint-row">손가락으로 끌어서 위치 조정 · 슬라이더로 확대</div>

      <div class="buttons">
        <label class="btn upload-btn">
          업로드
          <input type="file" id="file" accept="image/*,video/*" />
        </label>
        <button id="play" class="btn hide">재생</button>
        <button id="reset" class="btn" disabled>초기화</button>
        <button id="record" class="btn hide">녹화</button>
        <button id="download" class="btn" disabled>저장</button>
        <button id="share" class="btn" disabled>공유</button>
      </div>
    </div>
  </main>

  <div id="dropOverlay" class="drop-overlay">
    <span>여기에 놓아주세요</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
